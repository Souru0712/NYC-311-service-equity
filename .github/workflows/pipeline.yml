name: Pipeline

on:
  schedule:
    - cron: "0 6 * * *"   # 6 AM UTC daily — matches Airflow DAG schedule
  workflow_dispatch:
    inputs:
      start_year:
        description: "Backfill from year (e.g. 2020). Leave blank for incremental."
        required: false
        default: ""

concurrency:
  group: pipeline          # only one pipeline run at a time
  cancel-in-progress: false

jobs:
  run:
    name: ${{ github.event.inputs.start_year != '' && format('Backfill from {0}', github.event.inputs.start_year) || 'Incremental load' }}
    runs-on: ubuntu-24.04
    timeout-minutes: 90
    env:
      SOCRATA_APP_TOKEN:    ${{ secrets.SOCRATA_APP_TOKEN }}
      SOCRATA_DATASET_ID:   ${{ secrets.SOCRATA_DATASET_ID }}
      AWS_ACCESS_KEY_ID:    ${{ secrets.AWS_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
      AWS_DEFAULT_REGION:   ${{ secrets.AWS_DEFAULT_REGION }}
      S3_BUCKET:            ${{ secrets.S3_BUCKET }}
      SNOWFLAKE_ACCOUNT:    ${{ secrets.SNOWFLAKE_ACCOUNT }}
      SNOWFLAKE_USER:       ${{ secrets.SNOWFLAKE_USER }}
      SNOWFLAKE_PASSWORD:   ${{ secrets.SNOWFLAKE_PASSWORD }}
      SNOWFLAKE_WAREHOUSE:  ${{ secrets.SNOWFLAKE_WAREHOUSE }}
      SNOWFLAKE_DATABASE:   ${{ secrets.SNOWFLAKE_DATABASE }}
      SNOWFLAKE_ROLE:       ${{ secrets.SNOWFLAKE_ROLE }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install pipeline dependencies
        # Excludes airflow, streamlit, great-expectations — not needed for ingestion + dbt
        run: |
          pip install \
            sodapy==2.2.0 \
            boto3==1.35.0 \
            requests==2.32.3 \
            pandas==2.1.3 \
            pyarrow==17.0.0 \
            shapely==2.0.6 \
            geopandas==0.14.4 \
            pygris==0.2.1 \
            snowflake-connector-python==3.12.0 \
            dbt-snowflake==1.8.4 \
            python-dotenv==1.0.1

      - name: Write dbt profiles.yml
        run: |
          mkdir -p ~/.dbt
          cat > ~/.dbt/profiles.yml << EOF
          nyc_311_equity:
            target: dev
            outputs:
              dev:
                type: snowflake
                account: $SNOWFLAKE_ACCOUNT
                user: $SNOWFLAKE_USER
                password: $SNOWFLAKE_PASSWORD
                role: $SNOWFLAKE_ROLE
                database: $SNOWFLAKE_DATABASE
                warehouse: $SNOWFLAKE_WAREHOUSE
                schema: STAGING
                threads: 4
          EOF

      # ── Incremental: reads MAX timestamp from Snowflake as the watermark ────
      - name: Incremental load (watermark → Snowflake)
        if: ${{ github.event.inputs.start_year == '' }}
        run: python scripts/run_incremental.py

      # ── Backfill: month-by-month from start_year to present ─────────────────
      - name: Backfill load (from ${{ github.event.inputs.start_year }})
        if: ${{ github.event.inputs.start_year != '' }}
        run: |
          python -c "
          from ingestion.backfill import run_full_backfill
          run_full_backfill(start_year=int('${{ github.event.inputs.start_year }}'))
          "

      # ── dbt: rebuild staging → intermediate → marts ──────────────────────────
      - name: dbt deps
        working-directory: dbt
        run: dbt deps

      - name: dbt run
        working-directory: dbt
        run: |
          dbt run --select staging
          dbt run --select intermediate
          dbt run --select marts
